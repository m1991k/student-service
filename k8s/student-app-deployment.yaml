apiVersion: v1
kind: ConfigMap
metadata:
  name: student-app-config
  namespace: student-app
data:
  MONGO_DB: "school"
  APP_NAME: "Student Service"
  DEBUG: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: student-app-secret
  namespace: student-app
type: Opaque
data:
  MONGO_URI: bW9uZ29kYjovL2FkbWluOkFkbWluJTQwMTIzQG1vbmdvZGI6MjcwMTcvP2F1dGhTb3VyY2U9YWRtaW4=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app
  namespace: student-app
  labels:
    app: student-app
    version: v1
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: student-app
  template:
    metadata:
      labels:
        app: student-app
        version: v1
    spec:
      containers:
        - name: student-app
          image: m1991karm/student-service:v1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # Environment variables
          env:
            - name: MONGO_DB
              valueFrom:
                configMapKeyRef:
                  name: student-app-config
                  key: MONGO_DB
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: student-app-config
                  key: APP_NAME
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: student-app-config
                  key: DEBUG
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: student-app-secret
                  key: MONGO_URI

          # Liveness probe - kills container if app is unresponsive
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe - removes from load balancer if not ready
          readinessProbe:
            httpGet:
              path: /api/v1/students/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          # Resource requests and limits
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          # Graceful shutdown
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

      # Pod disruption budget for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - student-app
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: student-app-service
  namespace: student-app
  labels:
    app: student-app
spec:
  type: ClusterIP # Use ClusterIP when exposed via Ingress
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: student-app
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: student-app-hpa
  namespace: student-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: student-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: student-app-pdb
  namespace: student-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: student-app
